- id: story_014
  title: 브레멘 음악대
  summary: 늙은 당나귀가 더 이상 농장에서 사랑받지 못한다고 느끼고 브레멘 음악가가 되겠다며 길을 떠난다. 길에서 힘이 빠진 개와 슬픈
    얼굴의 고양이, 그리고 잡혀갈 뻔한 닭을 차례로 만나 친구가 되어 네 마리 음악대를 이루고 함께 브레멘으로 향한다. 어두운 숲에서 불빛이
    새어 나오는 집을 발견한 네 동물은, 그 집을 차지한 도둑들을 놀라게 해 달아나게 만든 뒤 집 안에서 따뜻하게 쉬고, 브레멘에는 가지
    않고 이 숲 속 집에서 함께 살며 즐겁게 노래하기로 한다.
