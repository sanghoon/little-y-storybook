- id: story_002
  title: 토끼와 거북이
  summary: 숲속에서 빨리 달리는 토끼가 느린 거북이를 놀리자 거북이가 달리기 시합을 제안하고, 토끼는 방심해 나무 그늘에서 쉬다 잠이
    들고, 거북이는 끝까지 천천히 걸어가 시합에서 이기며, 토끼가 잘난 척을 반성하고 거북이에게 사과해 둘이 다시 사이좋게 지내게 되는
    이야기.
