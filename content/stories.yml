- id: orig_snake_rabbit
  title: 꼬불꼬불 뱀누리와 쿵쿵 토리
  summary: 겁이 많은 토끼 토리는 늘 혼자 놀다가, 숲 가장자리에 산다는 뱀누리가 무섭다고 생각해 멀리한다. 어느 날 갑작스러운 비로 굴이
    잠기자 토리는 물에 휩쓸릴 뻔하고, 지나가던 뱀누리가 몸을 다리처럼 만들어 토리를 구해 준다. 토리는 뱀누리가 생각보다 상냥하고
    다정하다는 걸 알게 되고, 둘은 서로의 느림과 빠름, 따뜻함과 서늘함을 맞춰 가며 숲 친구들에게 진짜 모습을 보여 준다. 처음엔 뱀을
    무서워하던 숲 동물들도 둘의 우정을 보고 마음을 열고, 뱀누리와 토리는 겁 많은 토끼와 오해받던 뱀에서 숲에서 제일 잘 어울리는 짝꿍
    친구가 된다.
  tags:
    - 창작동화
    - 동물
    - 우정
    - 용기
    - 편견극복
  versions:
    - ver_orig_snake_rabbit_01
