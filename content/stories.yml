  summary: 커다란 복숭아에서 태어난 모모타로는 노부부의 사랑 속에 씩씩하게 자라납니다. 마을을 괴롭히는 도깨비를 물리치기 위해 길을 떠난
    모모타로는 수수경단을 나눠주며 개, 원숭이, 꿩을 동료로 맞이합니다. 힘을 합쳐 도깨비 섬으로 쳐들어간 이들은 도깨비들을 혼내주고 보물을
    되찾아 마을로 돌아옵니다.
