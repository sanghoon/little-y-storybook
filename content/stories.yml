  title: 심청전
  summary: 앞 못 보는 아버지를 위해 공양미 삼백 석에 몸을 팔아 인당수에 빠진 효녀 심청의 이야기입니다. 심청은 바닷속 용궁에서 용왕님의
    도움으로 연꽃이 되어 세상으로 돌아오고, 왕비가 되어 아버지를 다시 만나게 됩니다. 딸의 살아있음을 확인한 심 봉사는 기쁨에 눈을 뜨게
