- id: story_023
  title: 헨젤과 그레텔
  summary: 가난 때문에 숲속에 남겨진 헨젤과 그레텔 남매가 길을 잃고 헤매다 과자로 만든 집을 발견합니다. 그곳에 사는 무서운 마녀에게
    붙잡혀 위기에 처하지만, 남매는 서로를 의지하며 지혜와 용기를 발휘합니다. 결국 그레텔이 마녀를 화덕에 가두어 물리치고, 남매는 마녀의
    보물을 챙겨 집으로 돌아와 아버지와 다시 행복하게 만납니다.
