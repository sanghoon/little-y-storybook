- id: story_013
  title: 반지의 제왕
  summary: 호빗 프로도가 친구 샘, 마법사 간달프, 전사 아라곤과 함께 세상을 어둠으로 묶으려는 절대 반지를 운명의 산까지 가져가 파괴하는
    여정을 그린 이야기.
