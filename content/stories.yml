- id: story_020
  title: 개미와 베짱이
  summary: 무더운 여름, 개미는 땀을 흘리며 겨울 양식을 모으지만 베짱이는 그늘에서 노래만 부릅니다. 찬 바람이 부는 겨울이 오자 준비
    없이 놀던 베짱이는 배고픔과 추위에 떨게 됩니다. 베짱이는 부끄러움을 무릅쓰고 개미를 찾아가 자신의 게으름을 후회하며 도움을 청합니다.
    개미는 반성하는 베짱이를 따뜻하게 맞이해 음식을 나눠주고, 베짱이는 감사의 노래를 부르며 함께 겨울을 보냅니다.
  tags:
