- id: story_011
  title: 정글북
  summary: 정글에서 늑대에게 길러진 인간 아이 모글리가 바기라와 발루의 도움을 받으며 호랑이 쉬어 칸의 위협을 피해 성장하고, 불인 붉은
    꽃을 통해 마지막 대면을 겪은 뒤 정글과 이별하고 인간 마을로 향하는 이야기이다.
