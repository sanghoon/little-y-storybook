- id: story_032
  title: 성냥팔이 소녀
  summary: 섣달그믐 밤, 추위와 배고픔에 떨던 성냥팔이 소녀가 성냥을 하나씩 켜며 따뜻한 난로와 음식, 크리스마스트리의 환상을 봅니다.
    마지막으로 그리운 할머니를 만난 소녀는 남은 성냥을 모두 태워 할머니와 함께 고통 없는 하늘나라로 떠납니다.
