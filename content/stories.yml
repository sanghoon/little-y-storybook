  summary: 엄청난 힘을 가진 영웅 헤라클레스가 자신의 잘못을 씻기 위해 에우리스테우스 왕이 내린 열두 가지 불가능한 임무에 도전하여,
    괴물을 물리치고 지혜와 용기로 모든 과업을 완수하는 그리스 신화 이야기입니다.
