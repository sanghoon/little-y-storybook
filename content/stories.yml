- id: story_015
  title: 방귀쟁이 며느리
  summary: 옛날 어느 시골 마을에 방귀를 유난히 크게 뀌는 딸이 있었어요. 집에서는 익숙해서 모두 깔깔 웃고 넘겼지만, 시집을 가게 되자
    딸은 시댁에서는 절대로 방귀를 안 뀌겠다고 마음먹어요. 혼례를 치르고 시댁에 간 뒤 며칠 동안 며느리는 밥을 먹을 때도, 일을 할 때도
    방귀를 꾹꾹 참느라 배가 더부룩해지고 얼굴빛까지 이상해집니다. 그러던 어느 날, 일을 하다 그만 참지 못하고 방귀를 한 번 뀌었는데,
    소리가 천둥처럼 울리고 집이 덜컹거려 시댁 식구들이 깜짝 놀라지요. 시아버지는 집 뒤에 있는 커다란 바위를 떠올리며, 이렇게 세면 바위도
    옮길 수 있겠다며 며느리에게 한 번 해 보자고 합니다. 며느리가 조심스레 바위 앞에 서서 힘을 주고 방귀를 뀌자, 그 큰 바위가 덜덜
    떨리더니 데굴데굴 굴러 내려가 길을 시원하게 터 주지요. 모두가 입을 떡 벌리고 서 있다가, 곧 시아버지의 농담을 시작으로 웃음이
    터지고, 며느리의 엉뚱한 재주를 두고 두고 웃음거리로 삼으며 즐겁게 지냈답니다.
  tags:
    - 전래동화
    - 유머
    - 가족
    - 재치
  versions:
    - ver_015_02
- id: story_016
  title: 도깨비 감투
  summary: 가난한 나무꾼 만수는 산골 마을에 살면서 늘 남들처럼 부자가 되고 싶어 했어요. 어느 날 밤 산길에서 도깨비들이 감투를 쓰고
    사라졌다 나타났다 하는 모습을 본 만수는, 도깨비들이 방심한 사이 감투 하나를 훔쳐 써 보고 스스로 몸이 사라지는 신기한 힘에 놀라요.
    처음에는 친구들을 놀래키고 시장에서 과일을 살짝 집어 먹는 장난으로 감투를 쓰던 만수는, 점점 욕심이 커져 마을 부자 집에 숨어 들어가
    쌀과 돈을 훔치기 시작해요. 마을에는 보이지 않는 도둑이 돌아다닌다는 소문이 퍼지고, 만수는 겁이 나면서도 감투의 힘을 쉽게 놓지
    못해요. 어느 비 오는 밤 다시 부자 집에 들어갔다가 넘어지며 감투가 벗겨져 사람들 앞에 정체가 드러나고, 만수는 붙잡혀 눈물을 흘리며
    감투를 얻게 된 일과 그동안의 잘못을 솔직히 털어놓아요. 그때 나타난 도깨비는 사람 것이 아닌 것을 탐내면 이런 일이 생긴다며 감투를
    거두어 가고, 만수는 훔친 물건을 모두 돌려준 뒤 다시는 그런 짓을 하지 않겠다고 다짐하면서 비록 가난하지만 스스로 힘으로 살아가려
    애쓰며 조용히 일상으로 돌아와요.
  tags:
