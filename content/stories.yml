- id: orig_snake
  title: 뱀 토리의 첫 친구
  summary: 숲 속 계곡에 사는 어린 뱀 토리는 길고 미끄러운 몸 때문에 다른 동물 친구들이 무서워한다. 토리는 슬픈 마음으로 혼자 놀다가,
    물을 무서워하는 새끼 다람쥐 루루를 만나게 된다. 토리는 자신의 부드럽고 유연한 몸을 이용해 돌 틈에 끼인 루루를 빼내 주고, 미끄러운
    비탈길을 함께 건너며 서로를 돕는다. 처음엔 서로를 낯설어했지만, 점점 서로의 다름을 이해하고 마음을 나누게 되며, 숲 속 동물들에게도
    서로를 소개하며 진짜 첫 친구가 된다.
  tags:
    - 창작동화
    - 동물
    - 우정
    - 성장
    - 자기이해
    - 편견극복
