- id: story_003
  title: 여우와 포도
  summary: 배고픈 여우가 숲길을 걷다가 높은 덩굴에 매달린 반짝이는 포도송이를 발견하고 먹으려고 여러 번 껑충껑충 뛰어 보지만, 포도가
    너무 높아서 끝내 닿지 못한다. 숨이 차고 다리가 후들거릴 만큼 애쓴 여우는 결국 포도를 포기하고, 돌아서며 저 포도는 분명 셀 거라며
    투덜거리고 스스로를 달래며 다른 길로 가 버린다.
  tags:
    - 고전각색
    - 지혜
    - 유머
  versions:
    - ver_003_01
- id: story_004
  title: 황금알을 낳는 거위
  summary: 가난하지만 성실한 농부 아저씨가 매일 황금알을 낳아 주는 거위를 얻어 갑자기 부자가 되지만, 더 많은 황금을 빨리 얻으려다
    거위를 놀라서 도망가게 만들고, 텅 빈 둥지를 보며 자신의 욕심을 깊이 후회하고 다시는 그러지 않겠다고 마음먹는 이야기이다.
  tags:
    - 고전각색
    - 지혜
    - 성장
  versions:
    - ver_004_01
    - ver_004_02
- id: story_005
  title: 금도끼 은도끼
  summary: 숲속 연못에서 도끼를 잃어버린 착한 나무꾼이 산신령을 만나 정직한 대답으로 금도끼와 은도끼까지 선물로 받고, 이를 들은 욕심쟁이
    나무꾼이 욕심을 부리다 자기 도끼까지 잃고 허탕을 치고 돌아가는 이야기.
  tags:
    - 전래동화
    - 고전각색
    - 정직
    - 지혜
  versions:
    - ver_005_01
- id: story_006
  title: 혹부리 영감
  summary: 옛날 시골 마을에 혹이 달린 두 영감이 살고 있었어요. 마음씨 착한 혹부리 영감은 숲에서 길을 잃었다가 밤에 숲속 도깨비 잔치를
    만나 신나게 춤을 추고, 도깨비 대장이 마음에 들어 해서 얼굴의 혹을 떼어 줍니다. 이 소식을 들은 욕심쟁이 영감은 똑같이 따라 했다가
    흥도 없이 욕심만 보인 탓에 도깨비들을 실망시키고, 오히려 다른 쪽 볼에 혹이 하나 더 붙어 혹이 두 개가 된 채 돌아가요.
  tags:
    - 전래동화
    - 고전각색
    - 유머
    - 지혜
  versions:
    - ver_006_01
- id: story_007
  title: 흥부와 놀부
  summary: 심술 많은 형 놀부와 마음 착한 동생 흥부가 살던 옛날, 흥부가 다친 제비를 정성껏 돌봐 주었다가 박씨를 선물로 받아 큰 복을
    얻고, 이를 질투한 놀부가 욕심을 부리다 화를 겪은 뒤 뉘우치고 흥부와 다시 사이좋게 지내게 되는 이야기입니다.
  tags:
