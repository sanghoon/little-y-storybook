- id: story_017
  title: 아기 돼지 삼형제
  summary: 엄마 돼지와 인사를 나눈 아기 돼지 삼형제가 각자 볏짚 집, 나무 집, 벽돌 집을 짓고 살다가, 숨을 불어 집을 무너뜨리려는
    늑대를 만나 겪는 이야기예요. 쉽게 지은 집은 금방 무너지지만, 셋째 돼지가 정성 들여 지은 튼튼한 벽돌 집은 아무리 불어도 무너지지
    않아서, 돼지들은 안전하게 지내고 늑대는 스스로 포기하고 물러나지요.
