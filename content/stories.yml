  summary: 페르세우스는 어머니를 괴롭히는 사악한 왕 폴리덱테스로부터 어머니를 지키기 위해, 눈을 마주치면 돌로 변하는 괴물 메두사의 머리를
    가져오기로 맹세합니다. 지혜의 여신 아테나의 도움으로 신비한 무기들을 얻은 페르세우스는 메두사를 물리치고 왕을 벌하여 평화를 되찾습니다.
