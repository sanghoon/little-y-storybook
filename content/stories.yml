- id: story_012
  title: 오즈의 마법사
  summary: 캔자스 소녀 도로시가 회오리바람에 휩쓸려 마법의 나라 오즈에 가게 되고, 집으로 돌아가기 위해 허수아비, 양철 나무꾼, 겁쟁이
    사자와 함께 오즈 마법사를 만나러 가는 모험을 하며 서쪽 마녀를 물리치고, 결국 친구들과 자신이 이미 지혜와 마음과 용기를 지니고
    있었음을 깨닫고 신비한 신발의 힘으로 집에 돌아가는 이야기이다.
