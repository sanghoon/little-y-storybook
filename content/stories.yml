- id: story_008
  title: 미운 오리 새끼
  summary: 농장에서 태어난 크고 회색빛의 미운 오리 새끼가 따돌림을 견디지 못하고 떠돌다 긴 겨울을 지나고, 봄날 호숫가에서 스스로가
    아름다운 백조임을 깨닫고 새 무리에 받아들여지는 이야기입니다.
  tags:
