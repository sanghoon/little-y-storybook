  summary: 제페토 할아버지가 만든 나무 인형 피노키오가 세상에 나와 겪는 모험과 성장 이야기입니다. 피노키오는 유혹에 빠져 거짓말을 하거나
    당나귀가 되는 등 시련을 겪지만, 결국 아빠를 구하고 정직과 용기를 배워 진짜 사람이 됩니다.
