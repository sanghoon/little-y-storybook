- id: story_019
  title: 의좋은 형제
  summary: 옛날 작은 시골 마을에 사이좋은 형제가 살았어요. 각자 살림을 차린 뒤에도 함께 농사를 지으며 지냈지요. 어느 해 농사가 잘되어
    곡식을 나누어 곳간에 들여놓았는데, 형은 막 살림을 시작한 아우가 걱정되어 밤에 몰래 곡식 자루를 아우의 곳간으로 옮겼어요. 아우도 식구
    많은 형이 더 힘들 거라고 생각하며 자기 곡식을 형의 곳간으로 옮겼지요. 며칠 동안 서로 모르게 같은 일을 되풀이하던 어느 달 밝은 밤,
    두 사람은 언덕에서 곡식 자루를 들고 가다가 마주쳤어요. 그제야 서로가 서로를 걱정해 곡식을 옮겼다는 걸 알게 된 형제는 웃으며 서로를
    꼭 안았고, 곡식을 다시 사이좋게 나누어 쌓아 두고 앞으로도 무엇이든 함께 나누며 살았어요.
