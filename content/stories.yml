- id: story_027
  title: 바보 온달과 평강공주
  summary: 울보였던 평강공주는 바보 온달에게 시집보내겠다는 아버지 평원왕의 농담을 진담으로 받아들이고, 성인이 되어 궁을 나와 온달을
    찾아간다. 공주의 지혜와 내조 덕분에 온달은 글과 무예를 익혀 훌륭한 장군으로 성장하고 왕에게도 인정받는다. 나라를 위해 전장에 나간
    온달은 안타깝게 전사하는데, 장례를 치르려 하자 그의 관이 땅에서 떨어지지 않는다. 뒤늦게 달려온 평강공주가 관을 어루만지며 위로하자
    그제야 관이 움직이며 온달은 편안히 떠난다.
