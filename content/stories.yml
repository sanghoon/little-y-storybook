- id: story_004
  title: 황금알을 낳는 거위
  summary: 가난하지만 성실한 농부 아저씨가 매일 황금알을 낳아 주는 거위를 얻어 갑자기 부자가 되지만, 더 많은 황금을 빨리 얻으려다
    거위를 놀라서 도망가게 만들고, 텅 빈 둥지를 보며 자신의 욕심을 깊이 후회하고 다시는 그러지 않겠다고 마음먹는 이야기이다.
