- id: story_009
  title: 행복한 왕자
  summary: 높은 탑 위 황금빛 동상인 행복한 왕자와 따뜻한 나라로 가던 작은 제비가 만나, 왕자의 칼자루에 박힌 루비와 푸른 눈 두 개,
    몸을 덮은 황금 잎들을 하나씩 내어 주며 가난한 사람들을 돕고, 끝내 제비는 왕자 곁에서 숨을 거두며 왕자의 납 심장도 둘로 갈라지지만,
    사람들에게 버려진 뒤 하늘나라에서 둘이 가장 소중한 것으로 다시 맞이되는 이야기.
  tags:
    - 고전각색
    - 나눔
    - 희생
  versions:
    - ver_009_01
- id: story_010
  title: 서유기
  summary: 돌에서 태어난 원숭이 손오공이 삼장법사, 저팔계, 사오정과 함께 서쪽 나라로 경전을 가지러 가며 여러 시련과 모험을 겪고 마침내
    경전을 얻어 돌아오는 이야기입니다.
