- id: story_001
  title: 해와 바람
  summary: 하늘에서 해와 바람이 누가 더 힘이 센지 내기를 하다가 외투를 입은 나그네를 보고 경쟁하고, 결국 따뜻한 해가 나그네의 외투를
    벗게 하며 바람과 함께 화해하는 이야기.
