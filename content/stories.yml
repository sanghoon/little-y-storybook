- id: story_021
  title: 골디락스와 세 마리 곰
  summary: 호기심 많은 소녀 골디락스가 숲속에서 길을 잃고 곰 가족의 오두막에 들어갑니다. 아무도 없는 집에서 죽을 먹고, 의자를
    부러뜨리고, 침대에서 잠이 든 골디락스는 산책에서 돌아온 곰 가족과 마주치게 됩니다.
